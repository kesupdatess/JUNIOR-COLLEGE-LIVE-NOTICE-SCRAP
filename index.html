<style>
:root {
  --primary: #2563eb;
  --primary-dark: #1e40af;
  --primary-light: #dbeafe;
  --primary-bg: #eff6ff;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #0f172a;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --border-hover: #cbd5e1;
  --shadow: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-hover: 0 8px 24px rgba(0,0,0,0.08);
  --success: #059669;
  --danger: #dc2626;
  --warning: #d97706;
  --radius: 14px;
  --radius-sm: 10px;
}

body.dark {
  --primary: #60a5fa;
  --primary-dark: #93c5fd;
  --primary-light: #1e3a8a;
  --primary-bg: #1e293b;
  --bg: #0f172a;
  --card: #1e293b;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --border: #334155;
  --border-hover: #475569;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-hover: 0 8px 24px rgba(0,0,0,0.5);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
  transition: background 0.25s, color 0.25s;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  padding-bottom: 90px;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: 
    radial-gradient(circle at 20% 10%, rgba(37,99,235,0.04) 0%, transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(37,99,235,0.03) 0%, transparent 40%);
  pointer-events: none;
  z-index: 0;
}

body.dark::before {
  background-image: 
    radial-gradient(circle at 20% 10%, rgba(96,165,250,0.06) 0%, transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(96,165,250,0.04) 0%, transparent 40%);
}

.container {
  max-width: 760px;
  margin: 0 auto;
  padding: 0 16px 40px;
  position: relative;
  z-index: 1;
}

.top-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 56px;
  background: color-mix(in srgb, var(--card) 85%, transparent);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.top-bar-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--text);
}

.top-bar-brand span:first-child { font-size: 1.3rem; }

.top-bar-actions { display: flex; gap: 6px; align-items: center; }

.icon-btn {
  width: 38px;
  height: 38px;
  background: var(--primary-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  color: var(--text);
  transition: all 0.15s;
}

.icon-btn:hover {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}

.page-header {
  margin-top: 72px;
  padding: 24px 0;
  text-align: center;
  border-bottom: 1px solid var(--border);

}

.page-header .logo { font-size: 2.5rem; margin-bottom: 8px; display: inline-block; }
.page-header h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.page-header p { color: var(--text-muted); font-size: 0.88rem; }
.page-header .instagram-btn { margin-top: 12px; }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-size: 0.875rem;
  font-weight: 600;
  text-decoration: none;
  border: none;

  transition: all 0.15s;
  font-family: inherit;
  white-space: nowrap;
}

.btn:hover { transform: translateY(-1px); }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline { background: var(--card); color: var(--text); border: 1px solid var(--border); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-full { width: 100%; padding: 12px; }
.btn-success { background: var(--success); color: white; }
.btn-danger { background: var(--danger); color: white; }
.btn-sm { padding: 7px 14px; font-size: 0.8rem; }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  transition: all 0.2s;
}

.card:hover {
  border-color: var(--border-hover);
  box-shadow: var(--shadow-md);
}

.card h2 {
  font-size: 1.05rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}

.card p { color: var(--text-muted); font-size: 0.88rem; margin: 8px 0; }

.card-featured {
  border-left: 3px solid var(--primary);
  background: linear-gradient(135deg, var(--card), var(--primary-bg));
}

.notice-college-section {

  padding-bottom: 20px;
  border-bottom: 1px dashed var(--border);
}

.notice-college-section:last-of-type {
  border-bottom: none;
  margin-bottom: 12px;
  padding-bottom: 0;
}

.notice-college-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}

.notice-college-header .college-icon { font-size: 1.3rem; }
.notice-college-header h3 { font-size: 0.98rem; font-weight: 700; color: var(--text); }

.notice-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-bottom: 10px;
  transition: all 0.2s;
  text-decoration: none;
  color: inherit;

}

.notice-card:hover {

  box-shadow: var(--shadow-md);

}

.notice-card.pinned {

.notice-header {

}

.cat-admission { background: var(--primary-bg); color: var(--primary); }
.cat-exam { background: rgba(220, 38, 38, 0.1); color: var(--danger); }
.cat-event { background: rgba(5, 150, 105, 0.1); color: var(--success); }

.notice-date { font-size: 0.72rem; color: var(--text-muted); }
.notice-title { font-size: 0.95rem; font-weight: 700; line-height: 1.4; margin-bottom: 6px; }
.notice-desc { font-size: 0.82rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 8px; }

.notice-pinned-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(217, 119, 6, 0.1);
  color: var(--warning);
  padding: 3px 8px;
  border-radius: 99px;
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}

.notice-img {
  width: 100%;
  max-height: 200px;
  object-fit: cover;
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
}

.notice-link-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--primary);
  text-decoration: none;
  transition: gap 0.2s;
}

.notice-link-btn:hover { gap: 10px; }

.view-all-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 18px;
  background: var(--primary);
  color: white;
  border-radius: var(--radius-sm);
  font-weight: 700;
  font-size: 0.9rem;
  text-decoration: none;
  transition: all 0.2s;
  margin-top: 14px;
  box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2);
}

.view-all-btn:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
}

.view-all-btn .arrow { transition: transform 0.2s; }
.view-all-btn:hover .arrow { transform: translateX(4px); }

.live-badge {
  background: var(--danger);
  color: white;
  font-size: 0.62rem;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: 50px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.live-badge::before {
  content: '';
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.countdown-card {
  background: linear-gradient(135deg, var(--card), var(--primary-bg));
  border: 1px solid var(--primary);
  position: relative;
  overflow: hidden;
}

.countdown-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--danger));
}

.countdown-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.countdown-badge {
  background: var(--danger);
  color: white;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 4px;
  letter-spacing: 0.5px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.countdown-badge::before {
  content: '';
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}

.countdown-title { font-size: 1rem; font-weight: 700; }
.countdown-subtitle { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 12px; }

.countdown-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin: 14px 0;
}

.countdown-unit {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 6px;
  text-align: center;
}

.countdown-num {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--primary-dark);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.countdown-label {
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-top: 4px;
  letter-spacing: 0.5px;
}

.countdown-note {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}

.countdown-note .highlight {
  color: var(--danger);
  font-weight: 700;
}

.events-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin: 14px 0;
}

.event-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--primary-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
}

.event-item::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  border-radius: 14px 0 0 14px;
}

.event-item[data-type="exam"]::before { background: var(--danger); }
.event-item[data-type="vacation"]::before { background: var(--success); }
.event-item[data-type="event"]::before { background: var(--primary); }

.event-item:hover {
  transform: translateX(3px);
  border-color: var(--primary);
  box-shadow: var(--shadow-md);
}

.event-date-box {
  width: 50px;
  height: 50px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.event-date-box .month {
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
}

.event-date-box .day {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
}

.event-info {
  flex: 1;
  min-width: 0;
}

.event-info .title {
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--text);
  margin-bottom: 3px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.event-info .meta {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 500;
}

.event-countdown {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--danger);
  background: rgba(220,38,38,0.08);
  padding: 3px 9px;
  border-radius: 50px;
  display: inline-block;
  margin-top: 4px;
}

.event-countdown.soon {
  color: var(--warning);
  background: rgba(217,119,6,0.1);
}

.event-countdown.far {
  color: var(--success);
  background: rgba(5,150,105,0.1);
}

.event-arrow {
  color: var(--primary);
  font-size: 0.9rem;
  flex-shrink: 0;
}

.link-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin: 12px 0;
}

.link-list a {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 14px;
  background: var(--primary-bg);
  color: var(--text);
  text-decoration: none;
  border-radius: var(--radius-sm);
  font-weight: 500;
  font-size: 0.88rem;
  transition: all 0.15s;
  border: 1px solid transparent;
}

.link-list a:hover {
  background: var(--primary);
  color: white;
  transform: translateX(2px);
}

.link-list a .arrow {
  opacity: 0;
  transition: all 0.2s;
  font-size: 0.8rem;
}

.link-list a:hover .arrow {
  opacity: 1;
  transform: translateX(3px);
}

.erp-features {
  list-style: none;
  margin: 14px 0;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
}

.erp-features li {
  padding: 11px 18px;
  font-size: 0.88rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 500;

}

.erp-features li:last-child { border-bottom: none; }
.erp-features li:nth-child(odd) { background: var(--primary-bg); }
.erp-features li:hover { background: var(--primary-light); }
.erp-features li a { color: inherit; text-decoration: none; }
.erp-features li a:hover { color: var(--primary); }

input, select, textarea {
  width: 100%;
  padding: 11px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  font-family: inherit;
  background: var(--card);
  color: var(--text);
  transition: all 0.15s;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}

input::placeholder, textarea::placeholder { color: var(--text-muted); }

label {
  display: block;
  font-size: 0.82rem;
  font-weight: 600;
  margin-bottom: 6px;
}

.form-group { margin-bottom: 12px; }

.ticker {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-bottom: 16px;
  overflow: hidden;
}

.ticker-label {
  background: var(--danger);
  color: white;
  font-size: 0.68rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  flex-shrink: 0;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.ticker-label::before {
  content: '';
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}

.ticker-content { overflow: hidden; flex: 1; white-space: nowrap; }

.ticker-text {
  display: inline-block;
  animation: scroll 40s linear infinite;
  font-size: 0.85rem;
  color: var(--text-muted);
  padding-left: 100%;
  font-weight: 500;
}

@keyframes scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-100%); }
}

.search-wrapper {
  position: sticky;
  top: 56px;
  z-index: 50;
  background: color-mix(in srgb, var(--bg) 90%, transparent);
  backdrop-filter: blur(12px);
  padding: 10px 16px;
  margin-bottom: 10px;
}

.search-input-wrap {
  position: relative;
  display: flex;
  align-items: center;
}

.search-icon {
  position: absolute;
  left: 14px;
  color: var(--text-muted);
  font-size: 0.9rem;
  pointer-events: none;
}

.search-input-wrap input {
  padding-left: 40px;
  padding-right: 14px;
  background: var(--card);
  border: 1px solid var(--border);

.search-suggestions {

}

.no-results {

  text-align: center;
  padding: 30px 20px;
  color: var(--text-muted);
  font-size: 0.9rem;
}

.no-results.active { display: block; }

.tools-grid {

  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin: 12px 0;
}

.tools-grid-3 { grid-template-columns: repeat(3, 1fr); }

.tool-card {

  background: var(--primary-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  text-align: center;
  transition: all 0.2s;
  text-decoration: none;
  color: inherit;
  display: block;
}

.tool-card:hover {

  border-color: var(--primary);
  box-shadow: var(--shadow-md);
}

.tool-icon { font-size: 1.6rem; margin-bottom: 6px; display: inline-block; }
.tool-name { font-weight: 700; font-size: 0.85rem; color: var(--primary-dark); margin-bottom: 4px; }
.tool-desc { font-size: 0.72rem; color: var(--text-muted); line-height: 1.3; }

.email-box {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  background: var(--primary-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-top: 12px;
}

.email-box .email {
  font-weight: 600;
  color: var(--primary-dark);
  font-size: 0.88rem;
  word-break: break-all;
}

.email-actions { display: flex; gap: 6px; }

.instagram-btn {
  background: linear-gradient(135deg, #E1306C, #C13584, #833AB4) !important;
  color: white !important;
  border: none !important;
}

.instagram-btn:hover { opacity: 0.95; }
.instagram-icon { width: 16px; height: 16px; }
