<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Junior College Notices</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
  body { background: #f8fafc; color: #0f172a; padding: 20px; max-width: 800px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #2563eb; }
  .header h1 { color: #1e40af; font-size: 1.5rem; }
  .header p { color: #64748b; font-size: 0.9rem; margin-top: 5px; }
  .search-box { margin-bottom: 20px; }
  .search-box input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; outline: none; }
  .search-box input:focus { border-color: #2563eb; }
  .notice-list { list-style: none; background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
  .notice-item { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; display: flex; gap: 12px; align-items: baseline; }
  .notice-item:last-child { border-bottom: none; }
  .notice-item:hover { background: #eff6ff; }
  .notice-tag { font-size: 0.7rem; font-weight: 700; color: #2563eb; background: #eff6ff; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
  .notice-title a { color: #1e293b; text-decoration: none; font-size: 0.95rem; font-weight: 600; }
  .notice-title a:hover { color: #2563eb; text-decoration: underline; }
  .loading, .empty { text-align: center; padding: 40px; color: #64748b; }
  .fallback { background: #fee2e2; color: #991b1b; padding: 15px; border-radius: 8px; text-align: center; margin-top: 15px; display: none; }
  .fallback a { color: #dc2626; font-weight: 700; }
</style>
</head>
<body>

<div class="header">
  <h1>🏫 Junior College Notices</h1>
  <p>Live updates from kesjrsanghvi.com</p>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="🔍 Search notices..." oninput="filterNotices()">
</div>

<ul id="noticeList" class="notice-list">
  <li class="loading">Fetching notices...</li>
</ul>

<div id="fallbackBox" class="fallback">
  ⚠️ Live fetch failed. <a href="https://kesjrsanghvi.com/enotices/" target="_blank">Click here to open official site</a>
</div>

<script>
const JUNIOR_URL = 'https://kesjrsanghvi.com/enotices/';
const PROXIES = [
  'https://corsproxy.io/?',
  'https://api.allorigins.win/raw?url=',
  'https://api.codetabs.com/v1/proxy?quest='
];

let allNotices = [];

async function loadNotices() {
  const list = document.getElementById('noticeList');
  const fallback = document.getElementById('fallbackBox');

  for (const proxy of PROXIES) {
    try {
      const res = await fetch(proxy + encodeURIComponent(JUNIOR_URL));
      if (!res.ok) continue;
      
      const htmlText = await res.text();
      if (!htmlText || htmlText.length < 100) continue;

      // Safe Regex (No 100ms loop error)
      const matches = htmlText.match(/<a[^>]+href="([^"]+)"[^>]*>([\s\S]*?)<\/a>/g) || [];
      const notices = [];
      const seen = new Set();

      for (let i = 0; i < matches.length; i++) {
        const match = matches[i];
        const hrefMatch = match.match(/href="([^"]+)"/);
        const titleMatch = match.match(/>([\s\S]*?)<\/a>/);
        
        if (!hrefMatch || !titleMatch) continue;
        
        const href = hrefMatch[1].trim();
        const title = titleMatch[1].replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();

        if (!title || title.length < 5 || seen.has(title)) continue;
        if (href === '#' || href.startsWith('javascript:')) continue;

        // Filter relevant notices
        const isRelevant = href.includes('.pdf') || href.includes('.doc') || 
          title.toLowerCase().includes('notice') || title.toLowerCase().includes('circular') || 
          title.toLowerCase().includes('admission') || title.toLowerCase().includes('result') ||
          title.toLowerCase().includes('exam') || title.toLowerCase().includes('fees') ||
          title.toLowerCase().includes('list') || title.toLowerCase().includes('updated');

        if (isRelevant) {
          seen.add(title);
          notices.push({
            title,
            href: href.startsWith('http') ? href : new URL(href, JUNIOR_URL).href,
            isPdf: href.includes('.pdf')
          });
        }
        if (notices.length >= 30) break;
      }

      if (notices.length > 0) {
        allNotices = notices;
        renderNotices();
        return;
      }
    } catch (e) {
      console.warn('Proxy failed:', proxy);
    }
  }

  // All proxies failed
  list.innerHTML = '<li class="empty">Unable to fetch notices automatically.</li>';
  fallback.style.display = 'block';
}

function renderNotices(filtered = null) {
  const list = document.getElementById('noticeList');
  const data = filtered || allNotices;

  if (data.length === 0) {
    list.innerHTML = '<li class="empty">No notices found</li>';
    return;
  }

  list.innerHTML = data.map(n => `
    <li class="notice-item">
      <span class="notice-tag">${n.isPdf ? '📄 PDF' : '🔗 Link'}</span>
      <div class="notice-title"><a href="${n.href}" target="_blank" rel="noopener">${n.title}</a></div>
    </li>
  `).join('');
}

function filterNotices() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!q) { renderNotices(); return; }
  const filtered = allNotices.filter(n => n.title.toLowerCase().includes(q));
  renderNotices(filtered);
}

// Load on start
loadNotices();
</script>

</body>
</html>
